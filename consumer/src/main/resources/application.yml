server:
  port: 8092

spring:
  application:
    name: consumer

  kafka:
    bootstrap-servers: 3.39.191.209:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.LongDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: abcd-group-1 # 모든 컨슈머에 적용되는 기본값
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false # 프로듀서가 보낸 타입(패키지 포함)을 무시하도록 설정

logging:
  level:
    org.example.consumer: debug